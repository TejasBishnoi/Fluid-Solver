<!DOCTYPE html>

<html>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<head>
<title>Euler Fluid - Airfoil</title>
<style>
body { font-family: verdana; font-size: 15px; }
.button {
	background-color: #606060;
	border: none;
	color: white;
	padding: 10px;
	font-size: 16px;
	margin: 4px 2px;
	cursor: pointer;
}
</style>
</head>

<body>

<button class="button" onclick="setupScene(1)">Wind Tunnel</button> <canvas id="myCanvas" style="border:2px solid"></canvas>

<script>

var canvas = document.getElementById("myCanvas");
var c = canvas.getContext("2d");	
canvas.width = window.innerWidth - 20;
canvas.height = window.innerHeight - 100;

var simHeight = 1.1;	
var cScale = canvas.height / simHeight;
var simWidth = canvas.width / cScale;

// ---------------- AIRFOIL FUNCTION ----------------
function isInsideAirfoil(x, y, cx, cy, chord = 0.3, thickness = 0.12) {
	let xr = (x - cx) / chord;
	let yr = (y - cy) / chord;

	if (xr < 0 || xr > 1) return false;

	let t = thickness;
	let yt = 5 * t * (
		0.2969 * Math.sqrt(xr) -
		0.1260 * xr -
		0.3516 * xr * xr +
		0.2843 * xr * xr * xr -
		0.1015 * xr * xr * xr * xr
	);

	return Math.abs(yr) < yt;
}

// ---------------- SIM (same as yours, trimmed) ----------------
class Fluid {
	constructor(density, numX, numY, h) {
		this.density = density;
		this.numX = numX + 2; 
		this.numY = numY + 2;
		this.numCells = this.numX * this.numY;
		this.h = h;
		this.u = new Float32Array(this.numCells);
		this.v = new Float32Array(this.numCells);
		this.p = new Float32Array(this.numCells);
		this.s = new Float32Array(this.numCells);
		this.m = new Float32Array(this.numCells);
		this.m.fill(1.0);
	}

	simulate(dt) {
		// minimal sim (your original unchanged core can stay)
	}
}

var scene = {
	obstacleX: 0.4,
	obstacleY: 0.5,
	fluid: null
};

function setupScene() {
	let res = 100;
	let h = 1.0 / res;
	let numX = Math.floor(simWidth / h);
	let numY = res;

	scene.fluid = new Fluid(1000, numX, numY, h);

	setObstacle(scene.obstacleX, scene.obstacleY);
}

// ---------------- MODIFIED OBSTACLE ----------------
function setObstacle(x, y) {

	let f = scene.fluid;
	let n = f.numY;

	for (let i = 1; i < f.numX-2; i++) {
		for (let j = 1; j < f.numY-2; j++) {

			f.s[i*n + j] = 1.0;

			let px = (i + 0.5) * f.h;
			let py = (j + 0.5) * f.h;

			if (isInsideAirfoil(px, py, x, y)) {

				f.s[i*n + j] = 0.0;
				f.m[i*n + j] = 1.0;
			}
		}
	}
}

// ---------------- DRAW ----------------
function draw() {
	let f = scene.fluid;
	let n = f.numY;

	c.clearRect(0,0,canvas.width,canvas.height);

	for (let i = 0; i < f.numX; i++) {
		for (let j = 0; j < f.numY; j++) {

			let val = f.s[i*n + j];
			c.fillStyle = val ? "#ffffff" : "#000000";

			let x = i * cScale * f.h;
			let y = canvas.height - j * cScale * f.h;

			c.fillRect(x, y, 3, 3);
		}
	}
}

function update() {
	draw();
	requestAnimationFrame(update);
}

setupScene();
update();

</script>

</body>
</html>
